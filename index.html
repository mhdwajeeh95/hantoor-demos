<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>حنطور — الديموز</title>
    <style>
      :root {
        --bg: #050f09;
        --bg2: #0a1a10;
        --fg: #f0f5f1;
        --muted: #b8d4be;
        --brand: #59b469;
        --brand-glow: rgba(89, 180, 105, 0.18);
        --brand-dim: rgba(89, 180, 105, 0.08);
        --card: #0c1a11;
        --border: #1a3322;
        --border-hover: #59b469;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        min-height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, "SF Arabic", "Segoe UI", "Tahoma", sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 48px 20px;
        gap: 52px;
        position: relative;
        overflow: hidden;
      }

      /* background glow matching the image */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 50% at 50% 60%, rgba(89,180,105,0.05) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 20% 80%, rgba(89,180,105,0.03) 0%, transparent 60%);
        pointer-events: none;
      }

      header {
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .logo-wrap {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: var(--brand);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 900;
        color: #050f09;
        box-shadow: 0 0 10px rgba(89,180,105,0.25);
      }

      header h1 {
        font-size: clamp(32px, 5vw, 56px);
        font-weight: 800;
        color: var(--brand);
        letter-spacing: 1px;
        text-shadow: 0 0 20px rgba(89,180,105,0.2);
      }

      header p {
        margin-top: 10px;
        font-size: clamp(14px, 1.8vw, 17px);
        color: var(--muted);
        letter-spacing: 0.3px;
      }

      .demos {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        width: 100%;
        max-width: 860px;
        position: relative;
        z-index: 1;
      }

      .demo-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px 30px;
        text-decoration: none;
        color: var(--fg);
        min-width: 220px;
        flex: 1;
        max-width: 360px;
        transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
        position: relative;
        overflow: hidden;
      }

      .demo-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--brand-dim);
        opacity: 0;
        transition: opacity 180ms ease;
        border-radius: inherit;
      }

      .demo-card:hover {
        border-color: var(--border-hover);
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(89,180,105,0.08);
      }

      .demo-card:hover::before { opacity: 1; }

      .demo-card .label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--brand);
        position: relative;
      }

      .demo-card h2 {
        font-size: 20px;
        font-weight: 700;
        position: relative;
      }

      .demo-card p {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.65;
        position: relative;
      }

      .arrow {
        margin-top: auto;
        padding-top: 12px;
        font-size: 18px;
        color: var(--brand);
        opacity: 0;
        transform: translateX(4px);
        transition: opacity 180ms ease, transform 180ms ease;
        position: relative;
      }

      .demo-card:hover .arrow {
        opacity: 1;
        transform: translateX(0);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-wrap">
        <div class="logo-icon">ح</div>
        <h1>حنطور</h1>
      </div>
      <p>مجموعة العروض التوضيحية</p>
    </header>

    <div class="demos">
      <a class="demo-card" href="provider-pitch-demo/">
        <span class="label">Demo 01</span>
        <h2>عرض المزوّد</h2>
        <p>لعبة أسئلة تكشف تدريجياً عن صورة حنطور مع كل إجابة.</p>
        <span class="arrow">←</span>
      </a>
    </div>
  </body>
</html>
